# Use HTTP for Zipkin in tests (Kafka client disabled; no Kafka required)
spring:
  boot:
    admin:
      client:
        enabled: false
  task:
    scheduling:
      enabled: false

# Disable gRPC server in tests (avoids port bind; Resilience4j tests use REST mocks)
grpc:
  server:
    port: -1

management:
  tracing:
    export:
      zipkin:
        transport: http
        endpoint: http://localhost:9411/api/v2/spans
