server:
  port: 8079

spring:
  application:
    name: inventory-microservice
  profiles:
    active: development

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: false

  h2:
    console:
      enabled: true

  cloud:
    function:
      definition: adoptionEventProcessor
    stream:
      bindings:
        adoptionEventProcessor-in-0:
          destination: adoption-events-v1
          group: inventory-service
        orderEventOut:
          destination: order-events-v1
        adoptionCongratulationOut:
          destination: adoption-congratulation-events-v1
      kafka:
        binder:
          brokers: localhost:9092
          replication-factor: 1
        bindings:
          adoptionEventProcessor-in-0:
            consumer:
              configuration:
                value.deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
                spring.json.trusted.packages: "*"
                spring.json.value.default.type: mx.hdmsantander.opsdemo.inventory.event.AdoptionEvent
          orderEventOut:
            producer:
              configuration:
                value.serializer: org.springframework.kafka.support.serializer.JsonSerializer
          adoptionCongratulationOut:
            producer:
              configuration:
                value.serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  tracing:
    export:
      enabled: true
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - mappings
          - scheduledtasks
          - info
          - metrics
          - prometheus
          - health
