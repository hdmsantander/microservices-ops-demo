server:
  port: 8081

spring:
  application:
    name: inventory-microservice
  profiles:
    active: development

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: false

  h2:
    console:
      enabled: true

  cloud:
    function:
      definition: adoptionEventProcessor
    stream:
      bindings:
        adoptionEventProcessor-in-0:
          destination: adoption-events-v1
          group: inventory-service
        orderEventOut:
          destination: order-events-v1
        adoptionCongratulationOut:
          destination: adoption-congratulation-events-v1
      kafka:
        binder:
          # landoop/fast-data-dev broker; override via SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
          brokers: localhost:9092
          replication-factor: 1
          enable-observation: true
          consumer-properties:
            '[value.deserializer]': org.springframework.kafka.support.serializer.JacksonJsonDeserializer
            '[spring.json.trusted.packages]': '*'
            '[spring.json.value.default.type]': mx.hdmsantander.opsdemo.inventory.event.AdoptionEvent
          producer-properties:
            '[value.serializer]': org.springframework.kafka.support.serializer.JacksonJsonSerializer

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 60s
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowSize: 100
        minimumNumberOfCalls: 5
    instances:
      inventoryService:
        baseConfig: default
      orderService:
        baseConfig: default
    aspect-order: 1
  retry:
    configs:
      default:
        maxAttempts: 5
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      orderService:
        baseConfig: default
        ignoreExceptions:
          - 'org.springframework.web.client.HttpClientErrorException$NotFound'
    instances:
      inventoryService:
        baseConfig: default
      orderService:
        baseConfig: orderService
    aspect-order: 2

management:
  metrics:
    enable:
      spring:
        kafka:
          template: false
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      enabled: true
      zipkin:
        # transport: kafka (default) | http. Use http to send spans via HTTP instead of Kafka.
        transport: kafka
        kafka:
          bootstrap-servers: localhost:9092
          topic: zipkin
        # Optional HTTP sender. Set transport: http and endpoint to use HTTP instead of Kafka.
        # endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - mappings
          - scheduledtasks
          - info
          - metrics
          - prometheus
          - health
