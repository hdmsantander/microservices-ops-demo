name: Run Tests

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install inventory-grpc-api
        run: mvn -B install -DskipTests -f inventory-grpc-api/pom.xml

      - name: Run query-microservice tests
        run: mvn -B test -f query-microservice/pom.xml

      - name: Run inventory-microservice tests
        run: mvn -B test -f inventory-microservice/pom.xml
