# Docker Compose - Full stack with dependency ordering and health checks
# Startup order: infra (redis,kafka,es) -> config -> exporters -> observability -> elk -> microservices

version: '3.9'

services:
  # === Layer 1: Infrastructure (no deps) ===
  redis:
    image: redis:7-alpine
    container_name: redis-demo
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  kafka:
    image: landoop/fast-data-dev
    container_name: kafka-demo
    environment:
      ADV_HOST: 127.0.0.1
      RUNTESTS: 0
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch-demo
    network_mode: host
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      "ES_JAVA_OPTS": "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:9200/_cluster/health?wait_for_status=yellow 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # === Layer 2: Config (standalone) ===
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server-demo
    network_mode: host
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health/readiness || wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # === Layer 3: Exporters (after their backends) ===
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: redis-exporter-demo
    environment:
      REDIS_ADDR: "localhost:6379"
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    container_name: elasticsearch-exporter-demo
    command:
      - '--es.uri=http://localhost:9200'
      - '--es.all'
      - '--es.indices'
    network_mode: host
    depends_on:
      elasticsearch:
        condition: service_healthy

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter-demo
    command:
      - '--kafka.server=localhost:9092'
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy

  # === Layer 4: Observability ===
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin-demo
    environment:
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus-demo
    volumes:
      - ./prometheus/:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9412'
    network_mode: host
    depends_on:
      redis-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9412/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana-demo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
    volumes:
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    network_mode: host
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # === Layer 5: ELK (after Kafka, Elasticsearch) ===
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana-demo
    network_mode: host
    environment:
      ELASTICSEARCH_HOSTS: '["http://localhost:9200"]'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://localhost:5601/api/status 2>/dev/null | grep -q '\"state\":\"green\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka-connect:
    build:
      context: ./elk/kafka-connect
      dockerfile: Dockerfile
    container_name: kafka-connect-demo
    network_mode: host
    environment:
      CONNECT_BOOTSTRAP_SERVERS: localhost:9092
      CONNECT_REST_ADVERTISED_HOST_NAME: localhost
      CONNECT_GROUP_ID: connect-application-logs
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: '/usr/share/java,/usr/share/confluent-hub-components'
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8083/connectors 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  elk-init:
    build:
      context: ./elk/init
      dockerfile: Dockerfile
    container_name: elk-init-demo
    network_mode: host
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
      kibana:
        condition: service_healthy

  # === Layer 6: Spring Cloud Services ===
  admin-server:
    build:
      context: ./admin-server
      dockerfile: Dockerfile
    container_name: admin-server-demo
    environment:
      SERVER_PORT: 8089
    network_mode: host
    stop_grace_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8089/actuator/health/readiness || wget -q --spider http://localhost:8089/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 25s

  # === Layer 7: Microservices (after all dependencies) ===
  query-microservice:
    build:
      context: ./query-microservice
      dockerfile: Dockerfile
    container_name: query-microservice-demo
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: development,kafka-logging
    stop_grace_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      elk-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/actuator/health/readiness || wget -q --spider http://localhost:8086/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  inventory-microservice:
    build:
      context: ./inventory-microservice
      dockerfile: Dockerfile
    container_name: inventory-microservice-demo
    network_mode: host
    environment:
      SPRING_PROFILES_ACTIVE: development,kafka-logging
    stop_grace_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      elk-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8085/actuator/health/readiness || wget -q --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
