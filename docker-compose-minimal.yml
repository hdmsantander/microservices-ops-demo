# Docker Compose - Minimal infrastructure (Kafka, Redis, Zipkin, Prometheus)
# Startup order: redis, kafka -> redis-exporter, zipkin -> prometheus
# Note: 'version' is obsolete in Compose V2, omitted to avoid warnings

services:
  redis:
    image: redis:7-alpine
    container_name: redis-demo
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: redis-exporter-demo
    environment:
      REDIS_ADDR: "localhost:6379"
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy

  kafka:
    image: landoop/fast-data-dev
    container_name: kafka-demo
    environment:
      ADV_HOST: 127.0.0.1
      RUNTESTS: 0
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin-demo
    environment:
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus-demo
    volumes:
      - ./prometheus/:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9412'
    network_mode: host
    depends_on:
      redis-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9412/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
