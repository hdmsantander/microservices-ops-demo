server:
  port: 8086

spring:
  application:
    name: query-microservice
  profiles:
    active: development

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    function:
      definition: orderEventConsumer
    stream:
      bindings:
        orderEventConsumer-in-0:
          destination: order-events-v1
          group: query-service
        adoptionEventOut:
          destination: adoption-events-v1
      kafka:
        binder:
          # landoop/fast-data-dev broker; override via SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
          brokers: localhost:9092
          replication-factor: 1
          enable-observation: true
          consumer-properties:
            '[value.deserializer]': org.springframework.kafka.support.serializer.JacksonJsonDeserializer
            '[spring.json.trusted.packages]': '*'
            '[spring.json.value.default.type]': mx.hdmsantander.opsdemo.query.event.OrderEvent
          producer-properties:
            '[value.serializer]': org.springframework.kafka.support.serializer.JacksonJsonSerializer

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 60s
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowSize: 100
        minimumNumberOfCalls: 5
    instances:
      petService:
        baseConfig: default
      inventoryService:
        baseConfig: default
    aspect-order: 1
  retry:
    configs:
      external:
        maxAttempts: 5
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      internal:
        maxAttempts: 2
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      petService:
        baseConfig: external
      inventoryService:
        baseConfig: internal
    aspect-order: 2
  ratelimiter:
    configs:
      default:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 3s
    instances:
      inventoryService:
        baseConfig: default

management:
  metrics:
    enable:
      spring:
        kafka:
          template: false
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      enabled: true
      zipkin:
        # transport: kafka (default) | http. Use http to send spans via HTTP instead of Kafka.
        transport: kafka
        kafka:
          bootstrap-servers: localhost:9092
          topic: zipkin
        # Optional HTTP sender. Set transport: http and endpoint to use HTTP instead of Kafka.
        # endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - mappings
          - scheduledtasks
          - info
          - metrics
          - prometheus
          - health
