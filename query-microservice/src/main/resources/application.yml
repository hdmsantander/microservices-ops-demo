server:
  port: 8080

spring:
  application:
    name: query-microservice
  profiles:
    active: development

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  cloud:
    function:
      definition: orderEventConsumer
    stream:
      bindings:
        orderEventConsumer-in-0:
          destination: order-events-v1
          group: query-service
        adoptionEventOut:
          destination: adoption-events-v1
      kafka:
        binder:
          # landoop/fast-data-dev broker; override via SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
          brokers: localhost:9092
          replication-factor: 1
          consumer-properties:
            '[value.deserializer]': org.springframework.kafka.support.serializer.JacksonJsonDeserializer
            '[spring.json.trusted.packages]': '*'
            '[spring.json.value.default.type]': mx.hdmsantander.opsdemo.query.event.OrderEvent
          producer-properties:
            '[value.serializer]': org.springframework.kafka.support.serializer.JacksonJsonSerializer

management:
  tracing:
    export:
      enabled: true
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include:
          - mappings
          - scheduledtasks
          - info
          - metrics
          - prometheus
          - health
