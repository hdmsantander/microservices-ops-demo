server:
  port: 8086

spring:
  application:
    name: query-microservice
  config:
    import: optional:configserver:http://localhost:8888
  profiles:
    active: development

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  boot:
    admin:
      client:
        url: http://localhost:8089
        instance:
          service-url: http://localhost:8086

  cloud:
    function:
      definition: orderEventConsumer
    stream:
      bindings:
        orderEventConsumer-in-0:
          destination: order-events-v1
          group: query-service
        adoptionEventOut:
          destination: adoption-events-v1
      kafka:
        binder:
          brokers: localhost:9092
          replication-factor: 1
          enable-observation: true
          consumer-properties:
            '[value.deserializer]': org.springframework.kafka.support.serializer.JacksonJsonDeserializer
            '[spring.json.trusted.packages]': '*'
            '[spring.json.value.default.type]': mx.hdmsantander.opsdemo.query.event.OrderEvent
          producer-properties:
            '[value.serializer]': org.springframework.kafka.support.serializer.JacksonJsonSerializer

resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 60s
        permittedNumberOfCallsInHalfOpenState: 5
        slidingWindowSize: 100
        minimumNumberOfCalls: 5
    instances:
      petService:
        baseConfig: default
      inventoryService:
        baseConfig: default
    aspect-order: 1
  retry:
    configs:
      default:
        maxAttempts: 5
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      external:
        maxAttempts: 5
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      internal:
        maxAttempts: 2
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      petService:
        baseConfig: external
      inventoryService:
        baseConfig: internal
    aspect-order: 2
  ratelimiter:
    configs:
      default:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 3s
    instances:
      inventoryService:
        baseConfig: default

management:
  metrics:
    enable:
      spring:
        kafka:
          template: false
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      enabled: true
      zipkin:
        transport: kafka
        kafka:
          bootstrap-servers: localhost:9092
          topic: zipkin
  endpoints:
    web:
      exposure:
        include:
          - mappings
          - scheduledtasks
          - info
          - metrics
          - prometheus
          - health
  health:
    redis:
      enabled: true

reservation:
  ttl-seconds: 300
  cleanup-interval-seconds: 60

inventory:
  service-url: http://localhost:8085
  grpc:
    enabled: true

grpc:
  client:
    inventory:
      address: static://localhost:9090
      negotiationType: PLAINTEXT
